<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task6</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <section>
        <div class="image">
            <img src="https://png.pngtree.com/png-vector/20250530/ourmid/pngtree-cartoon-washing-machine-with-laundry-png-image_16421723.png" alt="machine-image">
        </div>
        <div class="form">
            <form action="#">
                <div class="greetings">
                    <h1>Hello Again!</h1>
                    <p>Welcome back! We missed you!</p>
                </div>
                <div class="login-details">
                    <div class="email">
                        <label for="email">Email</label>
                        <input type="email" id="email" placeholder="Email@site.com" required>
                    </div>
                    <div class="password">
                        <label for="password">Password</label>
                        <input type="password" id="password" placeholder="Password" required>
                        <a href="#">Forgot Password</a>
                    </div>
                    <div class="login">
                        <button>Login</button>
                        <p>Not a member?  <a href="#"> Register Now</a></p>
                    </div>
                </div>
            </form>
        </div>
    </section>
</body>
</html>
